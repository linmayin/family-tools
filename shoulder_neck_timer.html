<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>肩頸舒緩動作教學計時器</title>
<style>
  :root {
    --bg: #fdf6ec;
    --card: #ffffff;
    --accent: #e08a3c;
    --accent-dark: #c96f22;
    --text: #3a2e26;
    --muted: #8a7c6f;
    --ring-bg: #f0e2d0;
    --danger: #d9534f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(160deg, #fdf6ec 0%, #f7ead9 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(160, 110, 40, 0.15);
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  .app::before {
    content: "";
    position: absolute;
    top: -60px; right: -60px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, #fbd9a8 0%, transparent 70%);
    border-radius: 50%;
  }
  h1 {
    font-size: 19px;
    text-align: center;
    margin: 0 0 4px;
    letter-spacing: 1px;
    position: relative;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .progress-dots {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ring-bg);
    transition: all .3s;
  }
  .dot.active { background: var(--accent); transform: scale(1.3); }
  .dot.done { background: #c9b896; }

  .image-wrap {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background: #f4ead8;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  .pose-badge {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    backdrop-filter: blur(2px);
  }

  .pose-title {
    font-size: 17px;
    font-weight: 700;
    margin: 16px 0 4px;
    text-align: center;
  }
  .pose-note {
    font-size: 13.5px;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    line-height: 1.5;
    padding: 0 8px;
  }

  .timer-ring {
    display: flex;
    justify-content: center;
    margin: 16px 0 6px;
  }
  .ring-container {
    position: relative;
    width: 150px; height: 150px;
  }
  svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--ring-bg); stroke-width: 10; }
  .ring-fg {
    fill: none;
    stroke: var(--accent);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke .3s;
  }
  .ring-fg.urgent { stroke: var(--danger); }
  .time-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 34px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  button {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 13px 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    font-family: inherit;
  }
  button:active { transform: scale(0.96); }
  .btn-main {
    background: var(--accent);
    color: #fff;
    flex: 1.4;
  }
  .btn-main:hover { background: var(--accent-dark); }
  .btn-secondary {
    background: var(--ring-bg);
    color: var(--text);
  }
  .btn-secondary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .footer-info {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 14px;
  }

  .toggle-sound {
    position: absolute;
    top: 24px; right: 22px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    flex: none;
    padding: 4px;
  }

  .finished-banner {
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-dark);
    padding: 20px 0;
  }
</style>
</head>
<body>
<div class="app">
  <button class="toggle-sound" id="soundToggle" title="開關提示音">🔔</button>
  <h1>肩頸舒緩動作教學</h1>
  <div class="subtitle">每個動作維持 1 分鐘，時間到會自動提示並切換</div>

  <div style="text-align:center; margin-bottom:16px;">
    <a href="https://www.youtube.com/watch?v=sSQkh8xNRSc" target="_blank" rel="noopener"
       style="display:inline-flex; align-items:center; gap:6px; font-size:13px; color:#c96f22; background:#fbeeda; border:1px solid #f0d9b5; padding:7px 16px; border-radius:20px; text-decoration:none; font-weight:600;">
      ▶ 詳細完整教學
    </a>
  </div>

  <div class="progress-dots" id="dots"></div>

  <div id="mainContent">
    <div class="image-wrap">
      <span class="pose-badge" id="poseBadge">1 / 9</span>
      <img id="poseImg" src="" alt="動作示範">
    </div>

    <div class="pose-title" id="poseTitle"></div>
    <div class="pose-note" id="poseNote"></div>

    <div class="timer-ring">
      <div class="ring-container">
        <svg width="150" height="150">
          <circle class="ring-bg" cx="75" cy="75" r="65"></circle>
          <circle class="ring-fg" id="ringFg" cx="75" cy="75" r="65"
            stroke-dasharray="408.4" stroke-dashoffset="0"></circle>
        </svg>
        <div class="time-label" id="timeLabel">60</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-secondary" id="prevBtn">上一個</button>
      <button class="btn-main" id="startBtn">開始</button>
      <button class="btn-secondary" id="nextBtn">下一個</button>
    </div>
    <div class="controls">
      <button class="btn-secondary" id="resetBtn" style="flex:1">重設本動作</button>
    </div>
  </div>

  <div class="footer-info">完成後會有提示音，可自動跳到下一個動作</div>
</div>

const POSES = [{"title": "動作 1：手肘關節伸展", "note": "左手拉住右手手關節，輕輕向左延伸"}, {"title": "動作 2：手臂前伸延展", "note": "雙手交扣向前延伸，肩膀保持放鬆"}, {"title": "動作 3：拉高到脖頸處", "note": "將手臂拉高至脖頸位置，感受肩背延展"}, {"title": "動作 4：手肘往後推", "note": "左手掌托住右手肘，輕輕往後推"}, {"title": "動作 5：手肘過腦中線", "note": "右手手關節，要超過你腦的正中央"}, {"title": "動作 6：腰側放鬆插腰", "note": "手插腰側，肩膀自然下沉放鬆"}, {"title": "動作 7：前彎抓大拇指", "note": "身體前彎，左手抓住右手大拇指"}, {"title": "動作 8：轉動肩膀", "note": "雙手自然垂放，肩膀緩慢繞圈轉動"}, {"title": "動作 9：迴轉放鬆", "note": "輕輕的迴轉，放鬆迴轉兩腳也跟著抖動"}];
const DURATION = 60;

let current = 0;
let timeLeft = DURATION;
let running = false;
let timerInterval = null;
let soundOn = true;
let audioCtx = null;

const CIRC = 2 * Math.PI * 65;

const els = {
  img: document.getElementById('poseImg'),
  badge: document.getElementById('poseBadge'),
  title: document.getElementById('poseTitle'),
  note: document.getElementById('poseNote'),
  ring: document.getElementById('ringFg'),
  time: document.getElementById('timeLabel'),
  startBtn: document.getElementById('startBtn'),
  prevBtn: document.getElementById('prevBtn'),
  nextBtn: document.getElementById('nextBtn'),
  resetBtn: document.getElementById('resetBtn'),
  dots: document.getElementById('dots'),
  soundToggle: document.getElementById('soundToggle'),
};

function buildDots() {
  els.dots.innerHTML = '';
  for (let i = 0; i < POSES.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : (i < current ? ' done' : ''));
    els.dots.appendChild(d);
  }
}

function loadPose(index, resetTime = true) {
  current = index;
  const p = POSES[current];
  els.img.src = 'data:image/jpeg;base64,' + IMAGES[String(current + 1)];
  els.badge.textContent = (current + 1) + ' / ' + POSES.length;
  els.title.textContent = p.title;
  els.note.textContent = p.note;
  if (resetTime) {
    timeLeft = DURATION;
    updateRing();
  }
  els.prevBtn.disabled = current === 0;
  els.nextBtn.disabled = current === POSES.length - 1;
  buildDots();
}

function updateRing() {
  els.time.textContent = timeLeft;
  const offset = CIRC * (1 - timeLeft / DURATION);
  els.ring.style.strokeDashoffset = offset;
  els.ring.classList.toggle('urgent', timeLeft <= 5);
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq = 880, duration = 0.18, delay = 0) {
  if (!soundOn) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + delay + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + delay + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + delay);
  osc.stop(audioCtx.currentTime + delay + duration + 0.02);
}

function playAlertChime() {
  // 三聲提示音，明顯提醒切換動作
  beep(988, 0.2, 0);
  beep(988, 0.2, 0.25);
  beep(1318, 0.35, 0.5);
}

function tick() {
  timeLeft -= 1;
  if (timeLeft <= 0) {
    timeLeft = 0;
    updateRing();
    stopTimer();
    playAlertChime();
    if (current < POSES.length - 1) {
      setTimeout(() => {
        loadPose(current + 1);
        startTimer();
      }, 1200);
    } else {
      showFinished();
    }
    return;
  }
  updateRing();
}

function startTimer() {
  if (running) return;
  ensureAudio();
  running = true;
  els.startBtn.textContent = '暫停';
  timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  running = false;
  els.startBtn.textContent = '開始';
  clearInterval(timerInterval);
}

function showFinished() {
  document.getElementById('mainContent').innerHTML = `
    <div class="finished-banner">🎉 全部動作完成，肩頸放鬆囉！</div>
    <div class="controls">
      <button class="btn-main" id="restartBtn" style="flex:1">重新開始</button>
    </div>
  `;
  document.getElementById('restartBtn').addEventListener('click', () => {
    location.reload();
  });
}

els.startBtn.addEventListener('click', () => {
  if (running) {
    stopTimer();
  } else {
    startTimer();
  }
});

els.prevBtn.addEventListener('click', () => {
  stopTimer();
  if (current > 0) loadPose(current - 1);
});

els.nextBtn.addEventListener('click', () => {
  stopTimer();
  if (current < POSES.length - 1) loadPose(current + 1);
});

els.resetBtn.addEventListener('click', () => {
  stopTimer();
  timeLeft = DURATION;
  updateRing();
});

els.soundToggle.addEventListener('click', () => {
  soundOn = !soundOn;
  els.soundToggle.textContent = soundOn ? '🔔' : '🔕';
  if (soundOn) { ensureAudio(); beep(880, 0.1, 0); }
});

loadPose(0);
</script>
