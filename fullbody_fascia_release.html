<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全身性筋膜伸展教學計時器</title>
<style>
  :root {
    --bg: #eef5f2;
    --card: #ffffff;
    --accent: #3f8f74;
    --accent-dark: #2e6e58;
    --text: #29352f;
    --muted: #7c8a84;
    --ring-bg: #dcece5;
    --danger: #d9534f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(160deg, #eef5f2 0%, #e2efe9 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(40, 90, 70, 0.15);
    padding: 26px 22px 22px;
    position: relative;
    overflow: hidden;
  }
  .app::before {
    content: "";
    position: absolute;
    top: -60px; right: -60px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, #cdeadf 0%, transparent 70%);
    border-radius: 50%;
  }
  h1 {
    font-size: 19px;
    text-align: center;
    margin: 0 0 4px;
    letter-spacing: 1px;
    position: relative;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
  }

  .link-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .link-pill {
    display:inline-flex; align-items:center; gap:6px;
    font-size:12.5px; color: var(--accent-dark);
    background:#e3f3ec; border:1px solid #c7e6da;
    padding:6px 14px; border-radius:20px;
    text-decoration:none; font-weight:600;
  }

  .mode-toggle {
    display: flex;
    background: var(--ring-bg);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 16px;
    gap: 4px;
  }
  .mode-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 9px 6px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .progress-dots {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ring-bg);
    transition: all .3s;
  }
  .dot.active { background: var(--accent); transform: scale(1.3); }
  .dot.done { background: #a9cabd; }

  .image-wrap {
    display: flex;
    gap: 6px;
    border-radius: 18px;
    overflow: hidden;
    background: #f0f0ec;
  }
  .image-wrap.single { aspect-ratio: 4/3; }
  .image-wrap.double { aspect-ratio: 8/3; }
  .image-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    flex: 1;
    min-width: 0;
  }
  .image-badge-wrap { position: relative; }
  .pose-badge {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    backdrop-filter: blur(2px);
    z-index: 2;
  }

  .pose-title {
    font-size: 17px;
    font-weight: 700;
    margin: 16px 0 8px;
    text-align: center;
  }
  .pose-steps {
    font-size: 13.5px;
    color: var(--text);
    text-align: left;
    line-height: 1.7;
    padding: 12px 16px;
    background: #f5faf8;
    border-radius: 12px;
    margin: 0 0 4px;
  }
  .pose-steps div {
    padding-left: 1.1em;
    position: relative;
  }
  .pose-steps div::before {
    content: "•";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .timer-ring {
    display: flex;
    justify-content: center;
    margin: 14px 0 4px;
  }
  .ring-container {
    position: relative;
    width: 130px; height: 130px;
  }
  svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--ring-bg); stroke-width: 9; }
  .ring-fg {
    fill: none;
    stroke: var(--accent);
    stroke-width: 9;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke .3s;
  }
  .ring-fg.urgent { stroke: var(--danger); }
  .time-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  button.ctrl {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 13px 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    font-family: inherit;
  }
  button.ctrl:active { transform: scale(0.96); }
  .btn-main {
    background: var(--accent);
    color: #fff;
    flex: 1.4;
  }
  .btn-main:hover { background: var(--accent-dark); }
  .btn-secondary {
    background: var(--ring-bg);
    color: var(--text);
  }
  .btn-secondary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-next-big {
    background: var(--accent);
    color: #fff;
    padding: 16px;
    font-size: 15px;
  }
  .btn-next-big:hover { background: var(--accent-dark); }

  .footer-info {
    text-align: center;
    color: var(--muted);
    font-size: 11.5px;
    margin-top: 14px;
    line-height: 1.6;
  }

  .toggle-sound {
    position: absolute;
    top: 22px; right: 20px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    flex: none;
    padding: 4px;
  }

  .finished-banner {
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-dark);
    padding: 20px 0;
  }
</style>
</head>
<body>
<div class="app">
  <button class="toggle-sound" id="soundToggle" title="開關提示音">🔔</button>
  <h1>全身性筋膜伸展教學</h1>
  <div class="subtitle">共 10 個動作，可選自動播放或手動切換</div>

  <div class="link-row">
    <a class="link-pill" href="https://www.youtube.com/watch?v=GQ_IUoTgjXk&t=963s" target="_blank" rel="noopener">▶ 詳細教學影片</a>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="autoModeBtn">⏱ 自動播放（約20秒／動作）</button>
    <button class="mode-btn" id="manualModeBtn">👆 手動切換</button>
  </div>

  <div class="progress-dots" id="dots"></div>

  <div id="mainContent">
    <div class="image-badge-wrap">
      <span class="pose-badge" id="poseBadge">1 / 10</span>
      <div class="image-wrap single" id="imageWrap"></div>
    </div>

    <div class="pose-title" id="poseTitle"></div>
    <div class="pose-steps" id="poseSteps"></div>

    <div id="autoControls">
      <div class="timer-ring">
        <div class="ring-container">
          <svg width="130" height="130">
            <circle class="ring-bg" cx="65" cy="65" r="56"></circle>
            <circle class="ring-fg" id="ringFg" cx="65" cy="65" r="56"
              stroke-dasharray="351.9" stroke-dashoffset="0"></circle>
          </svg>
          <div class="time-label" id="timeLabel">20</div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl btn-secondary" id="prevBtn">上一個</button>
        <button class="ctrl btn-main" id="startBtn">開始</button>
        <button class="ctrl btn-secondary" id="nextBtn">下一個</button>
      </div>
      <div class="controls">
        <button class="ctrl btn-secondary" id="resetBtn" style="flex:1">重設本動作</button>
      </div>
    </div>

    <div id="manualControls" style="display:none;">
      <div class="controls" style="margin-top:16px;">
        <button class="ctrl btn-secondary" id="prevBtnM">上一個</button>
        <button class="ctrl btn-next-big" id="nextBtnM" style="flex:2">下一個動作 →</button>
      </div>
    </div>
  </div>

  <div class="footer-info">
    資料來源：下班經濟學．物理治療師 陳冠閔<br>
    自動播放模式時間到會有提示音，並自動切換下一個動作
  </div>
</div>

let audioCtx = null;
let autoMode = true;

const CIRC = 2 * Math.PI * 56;

const els = {
  badge: document.getElementById('poseBadge'),
  imageWrap: document.getElementById('imageWrap'),
  title: document.getElementById('poseTitle'),
  steps: document.getElementById('poseSteps'),
  ring: document.getElementById('ringFg'),
  time: document.getElementById('timeLabel'),
  startBtn: document.getElementById('startBtn'),
  prevBtn: document.getElementById('prevBtn'),
  nextBtn: document.getElementById('nextBtn'),
  resetBtn: document.getElementById('resetBtn'),
  prevBtnM: document.getElementById('prevBtnM'),
  nextBtnM: document.getElementById('nextBtnM'),
  dots: document.getElementById('dots'),
  soundToggle: document.getElementById('soundToggle'),
  autoModeBtn: document.getElementById('autoModeBtn'),
  manualModeBtn: document.getElementById('manualModeBtn'),
  autoControls: document.getElementById('autoControls'),
  manualControls: document.getElementById('manualControls'),
};

function buildDots() {
  els.dots.innerHTML = '';
  for (let i = 0; i < POSES.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : (i < current ? ' done' : ''));
    els.dots.appendChild(d);
  }
}

function renderImages(imgKeys) {
  els.imageWrap.className = 'image-wrap ' + (imgKeys.length > 1 ? 'double' : 'single');
  els.imageWrap.innerHTML = '';
  imgKeys.forEach(key => {
    const img = document.createElement('img');
    img.src = 'data:image/jpeg;base64,' + IMAGES[key];
    img.alt = '動作示範';
    els.imageWrap.appendChild(img);
  });
}

function loadPose(index, resetTime = true) {
  current = index;
  const p = POSES[current];
  renderImages(p.images);
  els.badge.textContent = (current + 1) + ' / ' + POSES.length;
  els.title.textContent = p.title;
  els.steps.innerHTML = p.steps.map(s => '<div>' + s + '</div>').join('');
  if (resetTime) {
    timeLeft = DURATION;
    updateRing();
  }
  const atStart = current === 0;
  const atEnd = current === POSES.length - 1;
  els.prevBtn.disabled = atStart;
  els.nextBtn.disabled = atEnd;
  els.prevBtnM.disabled = atStart;
  els.nextBtnM.textContent = atEnd ? '完成 ✓' : '下一個動作 →';
  buildDots();
}

function updateRing() {
  els.time.textContent = timeLeft;
  const offset = CIRC * (1 - timeLeft / DURATION);
  els.ring.style.strokeDashoffset = offset;
  els.ring.classList.toggle('urgent', timeLeft <= 5);
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq = 880, duration = 0.18, delay = 0) {
  if (!soundOn) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + delay + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + delay + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + delay);
  osc.stop(audioCtx.currentTime + delay + duration + 0.02);
}

function playAlertChime() {
  beep(988, 0.2, 0);
  beep(988, 0.2, 0.25);
  beep(1318, 0.35, 0.5);
}

function tick() {
  timeLeft -= 1;
  if (timeLeft <= 0) {
    timeLeft = 0;
    updateRing();
    stopTimer();
    playAlertChime();
    if (current < POSES.length - 1) {
      setTimeout(() => {
        loadPose(current + 1);
        startTimer();
      }, 1200);
    } else {
      showFinished();
    }
    return;
  }
  updateRing();
}

function startTimer() {
  if (running) return;
  ensureAudio();
  running = true;
  els.startBtn.textContent = '暫停';
  timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  running = false;
  els.startBtn.textContent = '開始';
  clearInterval(timerInterval);
}

function showFinished() {
  document.getElementById('mainContent').innerHTML = `
    <div class="finished-banner">🎉 全部動作完成，全身筋膜都鬆開囉！</div>
    <div class="controls">
      <button class="ctrl btn-main" id="restartBtn" style="flex:1">重新開始</button>
    </div>
  `;
  document.getElementById('restartBtn').addEventListener('click', () => {
    location.reload();
  });
}

els.startBtn.addEventListener('click', () => {
  if (running) {
    stopTimer();
  } else {
    startTimer();
  }
});

els.prevBtn.addEventListener('click', () => {
  stopTimer();
  if (current > 0) loadPose(current - 1);
});
els.nextBtn.addEventListener('click', () => {
  stopTimer();
  if (current < POSES.length - 1) loadPose(current + 1);
});
els.resetBtn.addEventListener('click', () => {
  stopTimer();
  timeLeft = DURATION;
  updateRing();
});

els.prevBtnM.addEventListener('click', () => {
  if (current > 0) loadPose(current - 1);
});
els.nextBtnM.addEventListener('click', () => {
  if (current < POSES.length - 1) {
    loadPose(current + 1);
  } else {
    showFinished();
  }
});

els.soundToggle.addEventListener('click', () => {
  soundOn = !soundOn;
  els.soundToggle.textContent = soundOn ? '🔔' : '🔕';
  if (soundOn) { ensureAudio(); beep(880, 0.1, 0); }
});

els.autoModeBtn.addEventListener('click', () => {
  if (autoMode) return;
  autoMode = true;
  els.autoModeBtn.classList.add('active');
  els.manualModeBtn.classList.remove('active');
  els.autoControls.style.display = '';
  els.manualControls.style.display = 'none';
  stopTimer();
  timeLeft = DURATION;
  updateRing();
});

els.manualModeBtn.addEventListener('click', () => {
  if (!autoMode) return;
  autoMode = false;
  els.manualModeBtn.classList.add('active');
  els.autoModeBtn.classList.remove('active');
  els.autoControls.style.display = 'none';
  els.manualControls.style.display = '';
  stopTimer();
});

loadPose(0);
</script>
</body>
</html>
