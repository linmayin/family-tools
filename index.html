<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="家庭工具箱">
<title>家庭工具箱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root{
    --bg: #FBF7EF;
    --card: #FFFFFF;
    --card-border: #E9DFCC;
    --ink: #3A342B;
    --ink-soft: #8B8272;
    --line: #E4D9C4;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    font-family: 'Noto Sans TC', -apple-system, sans-serif;
    color: var(--ink);
    padding: 28px 16px 60px;
  }

  .wrap{ max-width: 640px; margin: 0 auto; }

  header{ margin-bottom: 24px; text-align:center; }
  h1{
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 26px;
    margin: 0 0 6px;
    letter-spacing: 1px;
  }
  .sub{ font-size: 13.5px; color: var(--ink-soft); }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }

  a.card{
    text-decoration:none;
    color: inherit;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 18px;
    display:flex;
    gap: 14px;
    align-items:flex-start;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  a.card:active{ transform: scale(0.98); }

  .icon{
    width: 46px; height: 46px;
    border-radius: 12px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .icon svg{ width: 24px; height: 24px; }

  .icon.tone-1{ background:#E9F1E6; color:#5E8A63; }
  .icon.tone-2{ background:#FBEEDA; color:#C98A2E; }
  .icon.tone-3{ background:#E6F1FB; color:#3E7CB1; }
  .icon.tone-4{ background:#FBE7E1; color:#BD4E36; }

  .title{
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .desc{
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin: 0;
  }

  footer{
    text-align:center;
    margin-top: 32px;
    font-size: 11.5px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>家庭工具箱</h1>
    <div class="sub">日常生活的小幫手</div>
  </header>

  <div class="grid">

    <a class="card" href="./bedding_wash_tracker.html">
      <div class="icon tone-1" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18c0-2.5 2-4 4-4h10c2 0 4 1.5 4 4"/>
          <path d="M4 18v2"/>
          <path d="M20 18v2"/>
          <path d="M6 14v-3a6 6 0 0 1 12 0v3"/>
        </svg>
      </div>
      <div>
        <p class="title">寢具清洗提醒</p>
        <p class="desc">記錄每件棉被、被單的清洗日期，自動提醒下次該洗誰了</p>
      </div>
    </a>

    <a class="card" href="./finance_tracker.html">
      <div class="icon tone-2" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="6" width="18" height="13" rx="2"/>
          <path d="M3 10h18"/>
          <circle cx="16" cy="14" r="1.6"/>
        </svg>
      </div>
      <div>
        <p class="title">資金紀錄</p>
        <p class="desc">追蹤薪資、投資、專用帳戶三個帳戶的收支與轉帳紀錄</p>
      </div>
    </a>

    <a class="card" href="./transit_challenge.html">
      <div class="icon tone-3" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="4" width="14" height="13" rx="3"/>
          <path d="M5 12h14"/>
          <circle cx="9" cy="15.5" r="0.6" fill="currentColor"/>
          <circle cx="15" cy="15.5" r="0.6" fill="currentColor"/>
          <path d="M8 20l-1.5 2M16 20l1.5 2"/>
        </svg>
      </div>
      <div>
        <p class="title">暑期自主學習闖關</p>
        <p class="desc">每日任務、專注計時、集點闖過高雄捷運各站，完成暑假自學</p>
      </div>
    </a>

    <a class="card" href="./shoulder_neck_timer.html">
      <div class="icon tone-4" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 7v5l3.5 2"/>
        </svg>
      </div>
      <div>
        <p class="title">肩頸舒緩動作教學計時器</p>
        <p class="desc">跟著教學動作搭配計時器，舒緩久坐久站的肩頸痠痛</p>
      </div>
    </a>

    <a class="card" href="./fullbody_fascia_release.html">
      <div class="icon tone-1" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v4"/>
          <path d="M8 5l1.5 3"/>
          <path d="M16 5l-1.5 3"/>
          <circle cx="12" cy="12" r="7"/>
          <path d="M12 9v6M9 12h6"/>
        </svg>
      </div>
      <div>
        <p class="title">全身性筋膜伸展教學計時器</p>
        <p class="desc">10 個全身筋膜放鬆動作，可自動播放或手動切換，附詳細步驟說明</p>
      </div>
    </a>

    <a class="card" href="./travel_checklist.html">
      <div class="icon tone-2" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="8" width="16" height="12" rx="2"/>
          <path d="M9 8V6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          <path d="M4 13h16"/>
        </svg>
      </div>
      <div>
        <p class="title">旅行攜帶物品清單</p>
        <p class="desc">依過夜數自動算衣物件數，可打勾、標亮提醒、旅行結束一鍵重置</p>
      </div>
    </a>

  </div>

  <footer>家庭工具箱 · family-tools</footer>
</div>
</body>
</html>
