<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>寢具清洗提醒</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root{
    --bg: #FBF7EF;
    --card: #FFFFFF;
    --card-border: #E9DFCC;
    --ink: #3A342B;
    --ink-soft: #8B8272;
    --line: #E4D9C4;
    --fresh: #5E8A63;
    --fresh-bg: #E9F1E6;
    --soon: #C98A2E;
    --soon-bg: #FBEEDA;
    --overdue: #BD4E36;
    --overdue-bg: #FBE7E1;
    --never: #9C9384;
    --never-bg: #F0EBE0;
    --accent: #C98A2E;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    font-family: 'Noto Sans TC', -apple-system, sans-serif;
    color: var(--ink);
    padding: 20px 14px 60px;
  }

  .wrap{ max-width: 560px; margin: 0 auto; }

  header{ margin-bottom: 18px; }
  h1{
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 22px;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  .today{ font-size: 13px; color: var(--ink-soft); }

  .summary{
    display:flex; gap:10px; margin: 14px 0 18px;
  }
  .sum-box{
    flex:1;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 10px 12px;
    text-align:center;
  }
  .sum-num{ font-size: 20px; font-weight:700; font-family:'Noto Serif TC',serif; }
  .sum-label{ font-size: 11px; color: var(--ink-soft); margin-top:2px; }
  .sum-box.overdue .sum-num{ color: var(--overdue); }
  .sum-box.soon .sum-num{ color: var(--soon); }
  .sum-box.fresh .sum-num{ color: var(--fresh); }

  #list{ display:flex; flex-direction:column; gap:10px; }

  .item{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 12px 12px 6px;
    display:flex;
    gap: 4px;
    position: relative;
    touch-action: manipulation;
  }
  .item.dragging{
    z-index: 20;
    box-shadow: 0 6px 18px rgba(58,52,43,0.18);
    opacity: 0.95;
  }
  .handle{
    width: 30px;
    display:flex; align-items:center; justify-content:center;
    color: var(--ink-soft);
    cursor: grab;
    touch-action: none;
    font-size: 18px;
    user-select:none;
  }
  .handle:active{ cursor: grabbing; }
  .handle.locked{
    color: var(--card-border);
    cursor: default;
  }

  .body{ flex:1; min-width:0; }

  .top-row{
    display:flex; align-items:center; justify-content:space-between;
    gap: 8px; margin-bottom: 8px;
  }
  .name{
    font-size: 15.5px;
    font-weight: 500;
    background: none; border: none; color: var(--ink);
    font-family: inherit;
    padding: 2px 4px;
    border-radius: 6px;
    width: 100%;
  }
  .name:focus{ outline: 1px solid var(--line); background: var(--bg); }

  .del{
    border:none; background:none; color: var(--ink-soft);
    font-size: 16px; cursor:pointer; padding: 2px 4px; flex-shrink:0;
  }
  .del:hover{ color: var(--overdue); }

  .status{
    display:inline-block;
    font-size: 11.5px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .status.fresh{ background: var(--fresh-bg); color: var(--fresh); }
  .status.soon{ background: var(--soon-bg); color: var(--soon); }
  .status.overdue{ background: var(--overdue-bg); color: var(--overdue); }
  .status.never{ background: var(--never-bg); color: var(--never); }

  .line-row{
    position: relative;
    height: 14px;
    margin: 6px 2px 10px;
  }
  .line-track{
    position:absolute; top:6px; left:0; right:0; height:2px;
    background: var(--line);
  }
  .line-fill{
    position:absolute; top:6px; left:0; height:2px;
    background: var(--fresh);
  }
  .line-fill.soon{ background: var(--soon); }
  .line-fill.overdue{ background: var(--overdue); }
  .line-peg{
    position:absolute; top:0; width:14px; height:14px;
    border-radius:50%;
    background: var(--fresh);
    border: 2px solid var(--card);
    transform: translateX(-50%);
  }
  .line-peg.soon{ background: var(--soon); }
  .line-peg.overdue{ background: var(--overdue); }

  .dates-row{
    display:flex; justify-content:space-between;
    font-size: 11.5px; color: var(--ink-soft);
    margin-bottom: 10px;
  }

  .actions{ display:flex; gap:8px; align-items:center; }
  input[type=date]{
    font-family: inherit;
    font-size: 12.5px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 5px 7px;
    background: var(--bg);
    color: var(--ink);
  }
  .wash-btn{
    border: none;
    background: var(--accent);
    color: #FFF9EF;
    font-size: 12.5px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
  }
  .wash-btn:active{ transform: scale(0.97); }

  .add-row{
    display:flex; gap:8px; margin-top: 16px;
  }
  .add-row input{
    flex:1;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px dashed var(--line);
    background: var(--card);
    color: var(--ink);
  }
  .add-row button{
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 10px;
    padding: 0 16px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
  }

  .empty{
    text-align:center; color: var(--ink-soft); font-size: 13px;
    padding: 30px 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>寢具清洗提醒</h1>
    <div class="today" id="todayLabel"></div>
  </header>

  <div class="summary">
    <div class="sum-box overdue"><div class="sum-num" id="sumOverdue">0</div><div class="sum-label">已逾期</div></div>
    <div class="sum-box soon"><div class="sum-num" id="sumSoon">0</div><div class="sum-label">即將到期</div></div>
    <div class="sum-box fresh"><div class="sum-num" id="sumFresh">0</div><div class="sum-label">狀況良好</div></div>
  </div>

  <div id="list"></div>

  <div class="add-row">
    <input type="text" id="newItemInput" placeholder="新增項目，例如：客房棉被">
    <button id="addItemBtn">新增</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'bedding-wash-items';

const storage = (window.storage && typeof window.storage.get === 'function')
  ? window.storage
  : {
      async get(key){
        return { key, value: localStorage.getItem(key), shared: false };
      },
      async set(key, value){
        localStorage.setItem(key, value);
        return { key, value, shared: false };
      }
    };

const DEFAULT_ITEMS = [
  '主臥被單','Mia的棉被','Jim的棉被','Jim的毛毯',
  'Will的被單','Will的棉被','Ian的被單','Ian的厚棉被','Ian的薄被'
].map(name => ({ id: crypto.randomUUID(), name, lastWash: null }));

let items = [];

function todayStr(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}

function fmtDate(str){
  if(!str) return '—';
  const d = new Date(str + 'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function addWeeks(dateStr, n){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n * 7);
  return d;
}

function daysBetween(a, b){
  return Math.round((b - a) / 86400000);
}

async function loadItems(){
  try{
    const res = await storage.get(STORAGE_KEY, false);
    if(res && res.value){
      items = JSON.parse(res.value);
      sortItems();
      return;
    }
  }catch(e){}
  items = DEFAULT_ITEMS;
  await saveItems();
}

async function saveItems(){
  try{
    await storage.set(STORAGE_KEY, JSON.stringify(items), false);
  }catch(e){
    console.error('儲存失敗', e);
  }
}

function computeStatus(item){
  if(!item.lastWash){
    return { key:'never', label:'尚未記錄', diffDays:null };
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const nextDate = addWeeks(item.lastWash, 6);
  const diffDays = daysBetween(today, nextDate);
  if(diffDays < 0){
    return { key:'overdue', label:`已逾期 ${Math.abs(diffDays)} 天`, diffDays, nextDate };
  }else if(diffDays <= 7){
    return { key:'soon', label: diffDays === 0 ? '今天到期' : `${diffDays} 天後到期`, diffDays, nextDate };
  }else{
    return { key:'fresh', label:`還可再放 ${diffDays} 天`, diffDays, nextDate };
  }
}

function sortItems(){
  const washed = items.filter(i => i.lastWash).sort((a, b) => a.lastWash.localeCompare(b.lastWash));
  const unwashed = items.filter(i => !i.lastWash);
  items = [...washed, ...unwashed];
}

function lineProgress(item, status){
  if(!item.lastWash) return 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const last = new Date(item.lastWash + 'T00:00:00');
  const total = daysBetween(last, status.nextDate);
  const elapsed = daysBetween(last, today);
  const pct = (elapsed / total) * 100;
  return Math.min(Math.max(pct, 0), 100);
}

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('todayLabel').textContent = `今天是 ${fmtDate(todayStr())}`;

  let cOver = 0, cSoon = 0, cFresh = 0;

  if(items.length === 0){
    list.innerHTML = '<div class="empty">目前沒有項目，請在下方新增。</div>';
  }

  items.forEach(item => {
    const status = computeStatus(item);
    if(status.key === 'overdue') cOver++;
    else if(status.key === 'soon') cSoon++;
    else if(status.key === 'fresh') cFresh++;

    const pct = lineProgress(item, status);
    const nextLabel = item.lastWash ? fmtDate(addWeeks(item.lastWash, 6).toISOString().slice(0,10)) : '—';

    const el = document.createElement('div');
    el.className = 'item';
    el.dataset.id = item.id;
    el.dataset.washed = item.lastWash ? '1' : '0';
    el.innerHTML = `
      <div class="handle ${item.lastWash ? 'locked' : ''}" aria-label="${item.lastWash ? '已依日期排序' : '拖曳排序'}" title="${item.lastWash ? '已依清洗日期自動排序' : '拖曳排序'}">☰</div>
      <div class="body">
        <div class="top-row">
          <input class="name" value="${item.name.replace(/"/g,'&quot;')}" data-role="name">
          <button class="del" data-role="del" aria-label="刪除">✕</button>
        </div>
        <span class="status ${status.key}">${status.label}</span>
        <div class="line-row">
          <div class="line-track"></div>
          <div class="line-fill ${status.key === 'never' ? '' : status.key}" style="width:${item.lastWash ? pct : 0}%"></div>
          ${item.lastWash ? `<div class="line-peg ${status.key}" style="left:${pct}%"></div>` : ''}
        </div>
        <div class="dates-row">
          <span>上次清洗：${fmtDate(item.lastWash)}</span>
          <span>建議下次：${nextLabel}</span>
        </div>
        <div class="actions">
          <input type="date" data-role="datepick" value="${item.lastWash || ''}" max="${todayStr()}">
          <button class="wash-btn" data-role="washtoday">今天洗好</button>
        </div>
      </div>
    `;
    list.appendChild(el);
  });

  document.getElementById('sumOverdue').textContent = cOver;
  document.getElementById('sumSoon').textContent = cSoon;
  document.getElementById('sumFresh').textContent = cFresh;

  attachItemEvents();
  attachDragEvents();
}

function attachItemEvents(){
  document.querySelectorAll('.item').forEach(el => {
    const id = el.dataset.id;
    const item = items.find(i => i.id === id);

    el.querySelector('[data-role="name"]').addEventListener('change', e => {
      item.name = e.target.value.trim() || item.name;
      saveItems();
    });

    el.querySelector('[data-role="del"]').addEventListener('click', () => {
      if(confirm(`確定要刪除「${item.name}」嗎？`)){
        items = items.filter(i => i.id !== id);
        saveItems();
        render();
      }
    });

    el.querySelector('[data-role="datepick"]').addEventListener('change', e => {
      item.lastWash = e.target.value || null;
      sortItems();
      saveItems();
      render();
    });

    el.querySelector('[data-role="washtoday"]').addEventListener('click', () => {
      item.lastWash = todayStr();
      sortItems();
      saveItems();
      render();
    });
  });
}

function attachDragEvents(){
  const list = document.getElementById('list');
  let dragEl = null;
  let startY = 0;
  let pointerId = null;

  document.querySelectorAll('.handle').forEach(handle => {
    handle.addEventListener('pointerdown', e => {
      const candidate = handle.closest('.item');
      if(candidate.dataset.washed === '1') return;
      dragEl = candidate;
      startY = e.clientY;
      pointerId = e.pointerId;
      dragEl.classList.add('dragging');
      dragEl.setPointerCapture(pointerId);
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  });

  function onMove(e){
    if(!dragEl) return;
    const dy = e.clientY - startY;
    dragEl.style.transform = `translateY(${dy}px)`;

    const siblings = [...list.children].filter(el => el !== dragEl && el.dataset.washed === '0');
    for(const sib of siblings){
      const box = sib.getBoundingClientRect();
      const mid = box.top + box.height / 2;
      if(e.clientY < mid){
        list.insertBefore(dragEl, sib);
        break;
      }else if(sib === siblings[siblings.length - 1]){
        list.insertBefore(dragEl, sib.nextSibling);
      }
    }
  }

  function onUp(){
    if(!dragEl) return;
    dragEl.style.transform = '';
    dragEl.classList.remove('dragging');
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);

    const newOrder = [...list.children].map(el => el.dataset.id);
    items.sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
    saveItems();
    dragEl = null;
  }
}

document.getElementById('addItemBtn').addEventListener('click', () => {
  const input = document.getElementById('newItemInput');
  const name = input.value.trim();
  if(!name) return;
  items.push({ id: crypto.randomUUID(), name, lastWash: null });
  input.value = '';
  saveItems();
  render();
});

document.getElementById('newItemInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('addItemBtn').click();
});

(async function init(){
  await loadItems();
  render();
})();
</script>
</body>
</html>
